<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Div Practice</title>
    <style>
        #page{
            margin: auto;
            padding: 5px;
            width: 500px;
            border: 1px dotted rgb(0, 0, 0);
            background-color: rgb(100, 149, 237);
            display: flex;
            justify-content: space-between;
        }
        .coolCardz{
            border-style: solid;
            border-width: 4px;
            border-color: rgb(128, 128, 128) rgb(0, 0, 0) rgb(0, 0, 0) rgb(128, 128, 128);
            border-radius: 5px;
            background-color: rgb(206, 211, 202);
            width: 80PX;
            height: 100px;
        }
    </style>
</head>
<body>
    <div id="page">
        <div class="coolCardz">cool mans</div>
        <div class="coolCardz">bad mans</div>
        <div class="coolCardz">le mans</div>
        <div class="coolCardz">crazy mans</div>
        <div class="coolCardz">man mans</div>
    </div>
</body>
</html>
